# Deterministic per-row rules (no LLM). Applied by src/mapper.py.

# Fabric detection: first keyword found in the product name (then the Shopify
# fabric field) selects the fabric block. Each block fills Saree Fabric,
# Blouse Fabric, Wash Care, and HSN with Myntra-valid values (from the working file).
fabric_detection:
  order: [cotton, silk]   # check in this order; first match wins
  cotton:
    Saree Fabric: Pure Cotton
    Blouse Fabric: Pure Cotton
    Wash Care: Hand Wash
    HSN: "52081120"
  silk:
    Saree Fabric: Pure Silk
    Blouse Fabric: Pure Silk
    Wash Care: Dry Clean
    HSN: "50072010"

# Some mandatory constants exist as several numbered vocab columns in the template
# (e.g. Country Of Origin, Country Of Origin2..5). The constant fills only the base
# column; list the base here to copy its value across every "<base><digits>" sibling.
replicate_constant_across_numbered:
  - "Country Of Origin"

# Derive Prominent Colour by scanning the product name, then description,
# for any value in the Prominent Colour dropdown (longest/earliest match wins).
prominent_colour_from_name: true

# Dropdown vocab values never considered as a colour match (false positives).
colour_scan_exclude:
  - "NA"

# Deterministic colour synonyms: name keyword (left) -> Myntra dropdown value (right).
# Used when the raw colour word isn't itself a Myntra dropdown value.
colour_synonyms:
  golden: "Gold"
  ivory: "White"   # Myntra has no Ivory; list it as White

# Write lowercase prominent colour into the free-text "Brand Colour (Remarks)".
brand_colour_remarks_from_prominent: true

# Assign a sequential styleGroupId to each product row, continuing from the
# seller's existing Myntra catalog. styleGroupId of row i = style_group_id_start + (i-1).
# 8 products already listed -> next group starts at 9. Bump this before each new batch.
auto_style_group_id: true
style_group_id_start: 9

# Product Details: keep only the HTML after this heading (drops the Key Features
# block, keeps the product description). Set to empty/remove to keep the full body.
product_details_after_marker: "Product Description"
