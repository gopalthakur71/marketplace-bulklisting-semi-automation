name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:        # manual "Run workflow" button

# Default to read-only; the OIDC token (id-token: write) is granted only to the
# build-and-push job that needs it, not to the test job that runs untrusted PRs.
permissions:
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: marketplace-bulklisting

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests (deploy gate)
        run: python -m pytest -q

  build-and-push:
    # Only after tests pass, only on the main branch (push or manual dispatch),
    # and never on pull_request. The main-branch guard matches the IAM role's
    # trust policy (refs/heads/main) so a dispatch from any other branch can't
    # push :latest even if someone triggers it.
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

  deploy:
    # Roll the new :latest onto EC2 via SSM Run Command (no inbound SSH, no
    # static IP needed). The instance is targeted by its Name tag, so a
    # stop/start that changes its public IP does not break this. The systemd
    # unit re-pulls :latest on restart, so "restart" == "deploy".
    needs: build-and-push
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Redeploy listing-app on EC2 via SSM
        run: |
          set -euo pipefail
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=listing-app" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)
          if [ -z "$INSTANCE_ID" ]; then
            echo "No running instance tagged Name=listing-app"; exit 1
          fi
          echo "Deploying ${{ github.sha }} to $INSTANCE_ID"
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy ${{ github.sha }}" \
            --parameters 'commands=["systemctl restart listing-app"]' \
            --query "Command.CommandId" --output text)
          echo "SSM command: $CMD_ID"
          sleep 5   # let the invocation register before we poll it
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID"
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query "Status" --output text)
          echo "Deploy status: $STATUS"
          [ "$STATUS" = "Success" ]
