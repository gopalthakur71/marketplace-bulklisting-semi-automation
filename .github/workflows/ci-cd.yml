name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:        # manual "Run workflow" button

# Default to read-only; the OIDC token (id-token: write) is granted only to the
# build-and-push job that needs it, not to the test job that runs untrusted PRs.
permissions:
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: marketplace-bulklisting

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests (deploy gate)
        run: python -m pytest -q

  build-and-push:
    # Only after tests pass, only on the main branch (push or manual dispatch),
    # and never on pull_request. The main-branch guard matches the IAM role's
    # trust policy (refs/heads/main) so a dispatch from any other branch can't
    # push :latest even if someone triggers it.
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
